[config]
schemaVersion = "0.0.1"


[package]
namespace = "zerp"
name = "God_Banner"
versionNumber = "0.1.0"
description = "Allows you to ban certain gods from appearing in runs."
websiteUrl = "https://github.com/adi1998/GodBanner"
containsNsfwContent = false

[package.dependencies]
SGG_Modding-ModUtil = "4.0.1"
LuaENVY-ENVY = "1.2.0"
SGG_Modding-ReLoad = "1.0.2"

[build]
icon = "./icon.png"
readme = "./README.md"
outdir = "./build"

[[build.copy]]
source = "./CHANGELOG.md"
target = "./CHANGELOG.md"

[[build.copy]]
source = "./LICENSE"
target = "./LICENSE"

[[build.copy]]
source = "./src"
target = "./plugins"

[publish]
repository = "https://thunderstore.io"
communities = ["hades-ii"]

[publish.categories]
hades-ii = ["mods"]
